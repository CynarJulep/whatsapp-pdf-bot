[build]
  command = "npm install --prefix frontend && npm run build --prefix frontend"
  publish = "frontend/dist"

# Proxy /api/* → Render backend (mirrors the Vite dev server proxy)
# This allows the same relative /api/... fetch calls to work in both dev and prod.
[[redirects]]
  from = "/api/*"
  to = "https://whatsapp-pdf-bot-backend.onrender.com/:splat"
  status = 200
  force = true
